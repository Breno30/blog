name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Required for OIDC federation into AWS.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Set these as repository variables (Settings -> Secrets and variables -> Actions -> Variables).
      # Values come from `terraform output`.
      AWS_REGION: ${{ vars.AWS_REGION }}
      DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      BUCKET: ${{ vars.BUCKET }}
      DISTRIBUTION_ID: ${{ vars.DISTRIBUTION_ID }}
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build site
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Long-cache fingerprintable assets, short-cache HTML/feeds.
          aws s3 sync dist/ "s3://$BUCKET" --delete \
            --exclude "*.html" --exclude "*.xml" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 sync dist/ "s3://$BUCKET" --delete \
            --exclude "*" --include "*.html" --include "*.xml" \
            --cache-control "public,max-age=300,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
